    .floral-glass {
      position: fixed;
      inset: 0;
      z-index: 1;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    /* Page */
    .wrapper {
      position: relative;
      z-index: 3;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 24px;
    }

    /* Logo */
    .section-logo { display: flex; align-items: center; justify-content: center; }

    .logo {
      width: clamp(72px, 10vh, 96px);
      height: clamp(72px, 10vh, 96px);
      border-radius: 50%;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
      animation: fadeUp 0.9s ease both;
    }
    .logo img { width: 100%; height: 100%; object-fit: cover; }

    /* Section main */
    .section-main {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    /* Script heading */
    .script-heading {
      font-family: 'PhotographSignature', cursive;
      font-size: clamp(48px, 9vh, 88px);
      color: #2B2724;
      line-height: 1.05;
      text-align: center;
      margin-bottom: -6vh;
      position: relative;
      z-index: 2;
      animation: fadeUp 0.9s 0.1s ease both;
    }

    /* Card */
    .card {
      background: #faf8f4;
      width: min(46vh, 78vw);
      padding: 46px 77px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(10px, 1.8vh, 20px);
      animation: fadeUp 0.9s 0.2s ease both;
      flex-shrink: 0;
      position: relative;
    }

    /* Hero image */
    .hero-img {
      width: 100%;
      height: clamp(180px, 34vh, 360px);
      object-fit: cover;
      object-position: center;
      display: block;
    }

    /* Tagline inside card */
    .tagline {
      font-family: 'PhotographSignature', cursive;
      font-size: clamp(16px, 2.5vh, 28px);
      color: #2B2724;
      text-align: center;
      line-height: 1.3;
    }

    /* Footer */
    .section-footer {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      animation: fadeUp 0.9s 0.4s ease both;
    }

    .get-in-touch {
      font-family: 'Lato', sans-serif;
      font-size: clamp(8px, 1.1vh, 10px);
      font-weight: 400;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #1f1f1f;
      opacity: 0.5;
    }

    .email {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(13px, 1.8vh, 18px);
      font-weight: 300;
      letter-spacing: 0.06em;
      color: #2B2724;
      text-decoration: none;
    }
    .email:hover { opacity: 0.6; }

    .geo {
      font-family: 'Lato', sans-serif;
      font-size: clamp(8px, 1.1vh, 10px);
      font-weight: 400;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #1f1f1f;
      opacity: 0.5;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .wrapper { padding: 16px; }
      .card { padding: 16px 24px; width: 88vw; }
      .script-heading { font-size: clamp(40px, 11vw, 60px); margin-bottom: -4vh; }
      .logo { width: 72px; height: 72px; }
    }
  </style>
</head>

  <script>
    const glass = document.getElementById('floralGlass');
    let mouse = { x: null, y: null };
    let cur = { x: null, y: null };
    const R = () => window.innerWidth <= 480 ? Math.min(window.innerWidth, window.innerHeight) * 0.38 : Math.min(window.innerWidth, window.innerHeight) * 0.22;
    const lerp = (a, b, t) => a + (b - a) * t;

    function getPos(e) {
      return e.touches ? { x: e.touches[0].clientX, y: e.touches[0].clientY } : { x: e.clientX, y: e.clientY };
    }

    window.addEventListener('mousemove', e => { const p = getPos(e); mouse.x = p.x; mouse.y = p.y; });
    window.addEventListener('touchmove', e => { e.preventDefault(); const p = getPos(e); mouse.x = p.x; mouse.y = p.y; }, { passive: false });
    window.addEventListener('touchstart', e => { const p = getPos(e); mouse.x = p.x; mouse.y = p.y; });
    window.addEventListener('mouseleave', () => {
      mouse.x = null; mouse.y = null;
      glass.style.maskImage = '';
      glass.style.webkitMaskImage = '';
    });
    window.addEventListener('touchend', () => {
      setTimeout(() => {
        mouse.x = null; mouse.y = null;
        glass.style.maskImage = '';
        glass.style.webkitMaskImage = '';
      }, 800);
    });

    function draw() {
      requestAnimationFrame(draw);
      if (mouse.x === null) return;
      cur.x = cur.x === null ? mouse.x : lerp(cur.x, mouse.x, 0.1);
      cur.y = cur.y === null ? mouse.y : lerp(cur.y, mouse.y, 0.1);
      const r = R();
      const mask = `radial-gradient(circle ${r}px at ${cur.x}px ${cur.y}px, transparent 0%, transparent 40%, black 80%)`;
      glass.style.maskImage = mask;
      glass.style.webkitMaskImage = mask;
    }
    draw();
  </script>
